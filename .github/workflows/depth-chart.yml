name: Depth Chart Refresh

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force refresh (bypasses any future rate limit)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: depth-chart
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape depth chart
        env:
          FORCE_REFRESH: ${{ github.event.inputs.force }}
        run: python scripts/scrape_depth_chart.py

      - name: Commit depth chart data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/depth-chart.json data/scrape-log.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git commit -m "data: depth chart refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push

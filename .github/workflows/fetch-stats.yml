name: Stats Refresh

on:
  schedule:
    - cron: "15,45 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch MLB Stats API
        continue-on-error: true
        run: python scripts/fetch_mlb_stats.py

      - name: Fetch Baseball Savant
        continue-on-error: true
        run: python scripts/fetch_savant.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stats-mlb.json data/stats-savant.json data/scrape-log.json data/last-updated.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git commit -m "data: stats refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push

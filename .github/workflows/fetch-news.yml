name: News Refresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch RSS
        continue-on-error: true
        run: python scripts/fetch_rss.py

      - name: Scrape YES Network
        continue-on-error: true
        run: python scripts/scrape_yes.py

      - name: Scrape CBS Transactions
        continue-on-error: true
        run: python scripts/scrape_cbs_transactions.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi
          git commit -m "data: news refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          for i in 1 2 3; do
            git pull --rebase --autostash || true
            if git push; then exit 0; fi
            echo "push attempt $i failed; sleeping then retrying"
            sleep 5
          done
          echo "push failed after 3 attempts" >&2
          exit 1
